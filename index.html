<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>XBrowser 手机端 1:1 真实页面原型</title>
  <link rel="icon" href="assets/xbrowser-logo.png">
  <style>
    :root {
      --bg: #101318;
      --panel: #f7f8fa;
      --panel-2: #ffffff;
      --ink: #111318;
      --muted: #687181;
      --line: #dfe3e8;
      --accent: #1677ff;
      --ok: #0b8f67;
      --warn: #a35c00;
      --shadow: 0 24px 72px rgba(0, 0, 0, .34);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      color: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr) 320px;
      height: 100vh;
      overflow: hidden;
    }

    .nav,
    .inspector {
      min-width: 0;
      overflow: auto;
      background: var(--panel);
    }

    .nav {
      border-right: 1px solid var(--line);
    }

    .inspector {
      border-left: 1px solid var(--line);
    }

    .brand {
      padding: 16px;
      background: var(--panel-2);
      border-bottom: 1px solid var(--line);
    }

    .brand strong {
      display: block;
      font-size: 16px;
      line-height: 1.35;
    }

    .brand small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .search {
      padding: 12px;
      background: var(--panel-2);
      border-bottom: 1px solid var(--line);
    }

    .search input {
      width: 100%;
      height: 36px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f0f3f6;
      outline: none;
      color: var(--ink);
    }

    .search input:focus {
      border-color: var(--accent);
      background: #fff;
    }

    .nav-list {
      padding: 10px;
    }

    .nav-item {
      width: 100%;
      display: grid;
      gap: 3px;
      padding: 10px;
      border-radius: 8px;
      background: transparent;
      text-align: left;
      cursor: pointer;
    }

    .nav-item:hover {
      background: #eaf0f7;
    }

    .nav-item.active {
      background: #e6f1ff;
      color: #0b65d8;
      font-weight: 800;
    }

    .nav-item span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }

    .nav-item small {
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 11px;
      font-weight: 500;
    }

    .stage {
      min-width: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      background:
        radial-gradient(circle at 50% 0, rgba(255, 255, 255, .11), transparent 35%),
        var(--bg);
    }

    .toolbar {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 18px;
      color: #f6f8fb;
      border-bottom: 1px solid rgba(255, 255, 255, .08);
    }

    .toolbar h1 {
      margin: 0;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 15px;
      line-height: 1.3;
      font-weight: 800;
    }

    .toolbar-actions {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tool-btn {
      height: 34px;
      padding: 0 10px;
      border: 1px solid rgba(255, 255, 255, .18);
      border-radius: 8px;
      background: rgba(255, 255, 255, .08);
      color: #fff;
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
    }

    .tool-btn.active {
      border-color: rgba(22, 119, 255, .8);
      background: rgba(22, 119, 255, .28);
    }

    .canvas {
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      overflow: auto;
    }

    .phone {
      position: relative;
      width: min(430px, calc(100vw - 680px), calc((100vh - 92px) * 9 / 16));
      min-width: 300px;
      aspect-ratio: 9 / 16;
      background: #fff;
      box-shadow: var(--shadow);
      overflow: hidden;
      isolation: isolate;
      touch-action: none;
    }

    .phone.home-target {
      width: min(430px, calc(100vw - 680px), calc((100vh - 92px) * 1078 / 2348));
      aspect-ratio: 1078 / 2348;
      background: #f6f7fb;
    }

    .phone.tab-manager-active .global-tab-count {
      display: none;
    }

    .screen-stack {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: #fff;
      will-change: transform;
    }

    .screen-stack.dragging {
      transition: none;
    }

    .screen-stack.animating {
      transition: transform .28s cubic-bezier(.22, .72, .18, 1);
    }

    .phone img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      background: #fff;
    }

    .phone.home-target #screenImage {
      object-fit: fill;
    }

    .phone.search-focused-real #screenImage {
      object-fit: fill;
    }

    .phone img[hidden] {
      display: none;
    }

    .ange-logo-overlay {
      position: absolute;
      left: 50%;
      top: 28.8%;
      z-index: 3;
      width: 33%;
      height: 12%;
      display: grid;
      place-items: center;
      transform: translate(-50%, -50%);
      border-radius: 12px;
      background: #fff;
      pointer-events: none;
    }

    .phone.ange-logo-dim .ange-logo-overlay {
      background: #b5b5b5;
    }

    .ange-logo-overlay.ag-world-cup {
      top: 15.35%;
      z-index: 4;
      width: 78.7%;
      height: 13.35%;
      border-radius: 0;
      background: transparent;
    }

    .phone.ange-logo-dim .ange-logo-overlay.ag-world-cup {
      background: transparent;
    }

    .ange-logo-overlay img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: transparent;
    }

    .ange-logo-overlay[hidden] {
      display: none;
    }

    .user-center-icon-overlay {
      position: absolute;
      left: 5.55%;
      top: 50.35%;
      z-index: 3;
      width: 10.8%;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #fff;
      pointer-events: none;
    }

    .user-center-icon-overlay img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: transparent;
    }

    .user-center-icon-overlay[hidden] {
      display: none;
    }

    .address-scan-cover {
      position: absolute;
      left: 86.1%;
      top: 41.9%;
      z-index: 3;
      width: 7.35%;
      height: 4.05%;
      border-radius: 8px;
      background: #fff;
      pointer-events: none;
    }

    .address-scan-cover.dimmed {
      background: #b5b5b5;
    }

    .address-scan-cover[hidden] {
      display: none;
    }

    .search-brand-overlay {
      position: absolute;
      left: 13.1%;
      top: 11.85%;
      z-index: 4;
      width: 38%;
      height: 3.4%;
      display: flex;
      align-items: center;
      background: #fff;
      color: #111;
      font-size: calc(42px * var(--screen-scale, .398));
      font-weight: 400;
      line-height: 1;
      letter-spacing: 0;
      pointer-events: none;
    }

    .search-brand-overlay[hidden] {
      display: none;
    }

    .home-content-removal-overlay {
      position: absolute;
      left: 0;
      top: 8.5%;
      z-index: 3;
      width: 100%;
      height: 73.8%;
      background: #fff;
      pointer-events: none;
    }

    .home-content-removal-overlay[hidden] {
      display: none;
    }

    .home-reference-layout-overlay {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      bottom: 17.4%;
      z-index: 3;
      overflow: hidden;
      background: #f2f3f7;
      pointer-events: none;
    }

    .home-reference-layout-overlay img {
      display: block;
      width: 100%;
      height: auto;
      background: #f2f3f7;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
    }

    .home-reference-layout-overlay[hidden] {
      display: none;
    }

    .uc-search-overlay {
      position: absolute;
      left: 4.9%;
      top: 22.3%;
      z-index: 5;
      width: 90.2%;
      height: 7.65%;
      pointer-events: none;
      transition: top .12s linear, left .12s linear, width .12s linear, height .12s linear;
    }

    .uc-search-overlay[hidden] {
      display: none;
    }

    .uc-search-overlay.sticking {
      z-index: 6;
    }

    .uc-search-overlay.sticking::before {
      content: "";
      position: absolute;
      left: -8%;
      right: -8%;
      top: calc(-96px * var(--screen-scale, .398));
      height: var(--uc-sticky-backdrop-height, calc(360px * var(--screen-scale, .398)));
      border-bottom: 1px solid rgba(229, 231, 237, .55);
      background: rgba(242, 243, 247, var(--uc-sticky-bg-alpha, 1));
      z-index: 0;
    }

    .phone.reference-home-layout .uc-search-overlay.sticking::before {
      display: none;
    }

    .uc-search-bar {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      padding: 0 calc(44px * var(--screen-scale, .398)) 0 calc(24px * var(--screen-scale, .398));
      border: 1px solid rgba(244, 244, 244, .92);
      border-radius: 999px;
      background: rgba(255, 255, 255, .985);
      box-shadow: 0 calc(18px * var(--screen-scale, .398)) calc(42px * var(--screen-scale, .398)) rgba(42, 47, 55, .045);
      box-sizing: border-box;
    }

    .uc-search-overlay.sticking .uc-search-bar {
      border-color: rgba(245, 246, 249, .95);
      box-shadow: 0 calc(14px * var(--screen-scale, .398)) calc(34px * var(--screen-scale, .398)) rgba(43, 48, 58, .055);
    }

    .uc-engine-caret {
      flex: 0 0 calc(18px * var(--screen-scale, .398));
      width: calc(18px * var(--screen-scale, .398));
      min-width: calc(18px * var(--screen-scale, .398));
      max-width: calc(18px * var(--screen-scale, .398));
      height: calc(14px * var(--screen-scale, .398));
      min-height: calc(14px * var(--screen-scale, .398));
      max-height: calc(14px * var(--screen-scale, .398));
      margin-right: calc(14px * var(--screen-scale, .398));
      object-fit: contain;
      opacity: .78;
      align-self: center;
      transform: rotate(180deg);
      transform-origin: 50% 50%;
      pointer-events: none;
    }

    .uc-search-engine-icon {
      flex: 0 0 calc(70px * var(--screen-scale, .398));
      width: calc(70px * var(--screen-scale, .398));
      min-width: calc(70px * var(--screen-scale, .398));
      max-width: calc(70px * var(--screen-scale, .398));
      height: calc(70px * var(--screen-scale, .398));
      min-height: calc(70px * var(--screen-scale, .398));
      max-height: calc(70px * var(--screen-scale, .398));
      object-fit: contain;
      align-self: center;
      pointer-events: none;
    }

    .uc-search-bar.open .uc-engine-caret {
      transform: rotate(0deg);
    }

    .uc-search-input {
      flex: 1 1 auto;
      min-width: 0;
      height: 100%;
      margin-left: calc(20px * var(--screen-scale, .398));
      padding: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: #333941;
      font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: calc(54px * var(--screen-scale, .398));
      font-weight: 400;
      letter-spacing: 0;
      line-height: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: auto;
      caret-color: #2f7df6;
      appearance: none;
      -webkit-appearance: none;
    }

    .uc-search-input::placeholder {
      color: #b8bcc2;
      opacity: 1;
    }

    .uc-search-engine-overlay {
      position: absolute;
      left: 5.65%;
      top: 30.5%;
      z-index: 4;
      width: 88.7%;
      min-height: 0;
      padding: 0;
      border-radius: calc(34px * var(--screen-scale, .398));
      background: transparent;
      box-shadow: none;
      box-sizing: border-box;
      pointer-events: none;
      animation: ucSearchPanelIn 150ms ease-out;
      overflow: hidden;
    }

    .uc-search-engine-overlay.sticking {
      z-index: 5;
    }

    .uc-search-engine-overlay[hidden] {
      display: none;
    }

    .uc-engine-grid {
      display: grid;
      grid-template-columns: repeat(5, calc(150px * var(--screen-scale, .398)));
      justify-content: space-between;
      row-gap: calc(56px * var(--screen-scale, .398));
    }

    .uc-engine-reference-image {
      display: block;
      width: 100%;
      height: auto;
      background: transparent;
    }

    .uc-engine-item {
      display: grid;
      justify-items: center;
      align-content: start;
      gap: calc(20px * var(--screen-scale, .398));
      min-width: 0;
      color: #343941;
      font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: calc(36px * var(--screen-scale, .398));
      font-weight: 400;
      letter-spacing: 0;
      line-height: 1;
      text-align: center;
      white-space: nowrap;
    }

    .uc-engine-icon-wrap {
      width: calc(150px * var(--screen-scale, .398));
      height: calc(150px * var(--screen-scale, .398));
      display: grid;
      place-items: center;
      border: calc(6px * var(--screen-scale, .398)) solid transparent;
      border-radius: 999px;
      box-sizing: border-box;
    }

    .uc-engine-item.selected .uc-engine-icon-wrap {
      border-color: #2b98e9;
    }

    .uc-engine-item img {
      flex: 0 0 calc(132px * var(--screen-scale, .398));
      width: calc(132px * var(--screen-scale, .398));
      min-width: calc(132px * var(--screen-scale, .398));
      max-width: calc(132px * var(--screen-scale, .398));
      height: calc(132px * var(--screen-scale, .398));
      min-height: calc(132px * var(--screen-scale, .398));
      max-height: calc(132px * var(--screen-scale, .398));
      object-fit: contain;
    }

    @keyframes ucSearchPanelIn {
      from {
        opacity: .72;
        transform: translateY(calc(-10px * var(--screen-scale, .398)));
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .uc-home-shortcuts-overlay {
      position: absolute;
      left: 0;
      right: 0;
      top: 31.35%;
      z-index: 3;
      height: 9.8%;
      padding-top: calc(22px * var(--screen-scale, .398));
      background: #fff;
      pointer-events: none;
    }

    .uc-home-shortcuts-overlay[hidden] {
      display: none;
    }

    .uc-shortcuts-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      align-items: start;
    }

    .uc-shortcut {
      display: grid;
      justify-items: center;
      align-content: start;
      gap: calc(14px * var(--screen-scale, .398));
      color: #42454c;
      font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: calc(34px * var(--screen-scale, .398));
      font-weight: 400;
      line-height: 1;
      letter-spacing: 0;
      text-align: center;
      white-space: nowrap;
    }

    .uc-shortcut img {
      width: calc(104px * var(--screen-scale, .398));
      height: calc(104px * var(--screen-scale, .398));
      object-fit: contain;
      background: transparent;
    }

    .uc-shortcut.more img {
      width: calc(100px * var(--screen-scale, .398));
      height: calc(100px * var(--screen-scale, .398));
      margin-top: calc(2px * var(--screen-scale, .398));
      margin-bottom: calc(2px * var(--screen-scale, .398));
    }

    .uc-feed-overlay {
      position: absolute;
      left: 0;
      right: 0;
      top: 41.25%;
      bottom: 17.4%;
      z-index: 3;
      padding: 0;
      background: #f2f3f7;
      overflow: hidden;
      pointer-events: none;
    }

    .uc-feed-overlay[hidden] {
      display: none;
    }

    .phone.home-target .uc-feed-overlay {
      top: 41.14%;
      bottom: 4.65%;
    }

    .phone.home-target .uc-feed-overlay.collapsing {
      z-index: 4;
    }

    .uc-feed-scroll {
      display: block;
      will-change: transform;
      transition: none;
    }

    .uc-feed-sheet {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      background: #f2f3f7;
    }

    .uc-feed-card {
      min-height: calc(790px * var(--screen-scale, .398));
      padding: calc(36px * var(--screen-scale, .398)) calc(42px * var(--screen-scale, .398)) calc(34px * var(--screen-scale, .398));
      border: 0;
      border-radius: 0;
      background: #fff;
      box-shadow: none;
      box-sizing: border-box;
    }

    .phone.home-target .uc-feed-card {
      min-height: calc(1010px * var(--screen-scale, .398));
    }

    .uc-feed-card img.uc-feed-card-image {
      width: 100%;
      height: calc(420px * var(--screen-scale, .398));
      border-radius: calc(34px * var(--screen-scale, .398));
      object-fit: cover;
      background: #eef0f5;
    }

    .phone.home-target .uc-feed-card img.uc-feed-card-image {
      height: calc(522px * var(--screen-scale, .398));
    }

    .uc-feed-title {
      margin-top: calc(28px * var(--screen-scale, .398));
      color: #17191f;
      font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: calc(54px * var(--screen-scale, .398));
      font-weight: 400;
      letter-spacing: 0;
      line-height: 1.17;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .uc-feed-meta {
      margin-top: calc(28px * var(--screen-scale, .398));
      display: flex;
      align-items: center;
      gap: calc(13px * var(--screen-scale, .398));
      color: #69707d;
      font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: calc(36px * var(--screen-scale, .398));
      line-height: 1;
      white-space: nowrap;
    }

    .uc-feed-meta img.uc-feed-source-icon {
      width: calc(58px * var(--screen-scale, .398));
      height: calc(58px * var(--screen-scale, .398));
      border-radius: 50%;
      object-fit: cover;
      background: transparent;
    }

    .uc-feed-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: calc(46px * var(--screen-scale, .398));
      color: #565d69;
      font-size: calc(50px * var(--screen-scale, .398));
      line-height: 1;
    }

    .uc-more-overlay {
      position: absolute;
      inset: 0;
      z-index: 7;
      background: rgba(0, 0, 0, .33);
      pointer-events: none;
    }

    .uc-more-overlay[hidden] {
      display: none;
    }

    .uc-more-card {
      position: absolute;
      left: 12.5%;
      top: 28.2%;
      width: 75%;
      height: auto;
      aspect-ratio: 810 / 920;
      border-radius: calc(44px * var(--screen-scale, .398));
      background: transparent;
      box-shadow: none;
      overflow: hidden;
    }

    .uc-more-card-image {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: fill;
      background: transparent;
    }

    .uc-more-title {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(52px * var(--screen-scale, .398));
      color: #343941;
      font-size: calc(45px * var(--screen-scale, .398));
      font-weight: 400;
      line-height: 1;
      text-align: center;
    }

    .uc-more-grid {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(170px * var(--screen-scale, .398));
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      row-gap: calc(48px * var(--screen-scale, .398));
    }

    .uc-more-item {
      display: grid;
      justify-items: center;
      align-content: start;
      gap: calc(18px * var(--screen-scale, .398));
      min-width: 0;
      color: #343941;
      font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: calc(34px * var(--screen-scale, .398));
      font-weight: 400;
      line-height: 1;
      text-align: center;
      white-space: nowrap;
    }

    .uc-more-item img {
      width: calc(106px * var(--screen-scale, .398));
      height: calc(106px * var(--screen-scale, .398));
      object-fit: contain;
      background: transparent;
    }

    .uc-more-pager {
      position: absolute;
      left: 0;
      right: 0;
      bottom: calc(42px * var(--screen-scale, .398));
      display: flex;
      align-items: center;
      justify-content: center;
      gap: calc(8px * var(--screen-scale, .398));
      height: calc(16px * var(--screen-scale, .398));
    }

    .uc-more-pager span {
      display: block;
      width: calc(9px * var(--screen-scale, .398));
      height: calc(9px * var(--screen-scale, .398));
      border-radius: 999px;
      background: #d1d1d1;
    }

    .uc-more-pager span.active {
      width: calc(34px * var(--screen-scale, .398));
      border-radius: 999px;

      width: 34px;
      height: 34px;
      display: grid;

    .hotspot {
      position: absolute;
      padding: 0;
      border: 0;
      border-radius: 5px;
      background: transparent;
      cursor: pointer;
      touch-action: manipulation;
    }

    #hotspotLayer {
      position: absolute;
      inset: 0;
      z-index: 4;
    }

    .show-hotspots .hotspot {
      outline: 2px solid rgba(22, 119, 255, .72);
      background: rgba(22, 119, 255, .10);
    }

    .show-hotspots .hotspot:hover {
      background: rgba(22, 119, 255, .20);
    }

    .hotspot.pressed::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: rgba(0, 0, 0, .16);
      animation: tapFlash .18s ease-out both;
    }

    .toggle-feedback {
      position: absolute;
      z-index: 6;
      min-width: 48px;
      min-height: 24px;
      border-radius: 999px;
      background: rgba(20, 126, 255, .22);
      border: 2px solid rgba(20, 126, 255, .75);
      box-shadow: 0 0 0 6px rgba(20, 126, 255, .14);
      pointer-events: none;
      animation: togglePulse .62s ease-out both;
    }

    .toggle-feedback::after {
      content: "";
      position: absolute;
      top: 50%;
      right: 5px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #147eff;
      transform: translateY(-50%);
      box-shadow: 0 1px 4px rgba(0, 0, 0, .25);
    }

    @keyframes tapFlash {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    @keyframes togglePulse {
      0% { opacity: 0; transform: scale(.92); }
      18% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.08); }
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%) translateY(20px);
      max-width: min(520px, calc(100vw - 32px));
      padding: 10px 14px;
      border-radius: 8px;
      background: rgba(17, 19, 24, .92);
      color: #fff;
      font-size: 13px;
      line-height: 1.45;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
      z-index: 10;

      border-radius: 8px;
      background: #e9f8f2;
      color: #075b43;
      font-size: 12px;
      line-height: 1.5;
    }

    .coverage.warn {
      border-color: rgba(163, 92, 0, .25);
      background: #eef6ff;
      color: #175487;
    }

    .slide-status {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }

    .slide-chip {
      padding: 6px 8px;
      border: 1px solid #dbe2ea;
      border-radius: 999px;
      background: #fff;
      color: #374151;
      font-size: 11px;
      font-weight: 800;
      line-height: 1;
    }

    .slide-chip.ready {
      border-color: rgba(11, 143, 103, .25);
      background: #e9f8f2;
      color: #075b43;
    }

    .slide-chip.pending {

    .fullscreen .app {
      grid-template-columns: 1fr;
    }

    .fullscreen .nav,
    .fullscreen .inspector {
      display: none;
    }

    .fullscreen .phone {
      width: min(480px, calc((100vh - 92px) * 9 / 16), calc(100vw - 36px));
    }

    .fullscreen .phone.home-target {
      width: min(480px, calc((100vh - 92px) * 1078 / 2348), calc(100vw - 36px));
    }

    @media (max-width: 1060px) {

        display: none;

      }

      .canvas {

      }

      }

      }

      .phone.home-target #screenImage {

      }
    }

        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"

      renderSlideStatus(state);
      updateGlobalTabCount(state);
      renderNav();

    function updateSyntheticScale() {

    function shouldUseReferenceHomeLayout(state) {
      return Boolean(
        HOME_REFERENCE_LAYOUT_ENABLED &&
        state &&
        state.id === homeStateId() &&
        !state.syntheticScreen &&
        !isTabManagerState(state) &&
        isHomeLikeState(state) &&
        state.image

      return Boolean(
        !isPureXBrowserMode() &&
        state &&
        !state.syntheticScreen &&
        !isTabManagerState(state) &&
        isHomeLikeState(state) &&
        state.image

      return Boolean(isTargetHomeExact(state) || shouldUseReferenceHomeLayout(state));
    }

    function isSearchFocusedState(state) {
      if (!state) return false;
      const haystack = [state.id, state.title, state.name, state.source].join(" ");
      return Boolean(haystack.includes("搜索_地址栏") || haystack.includes("搜索/地址栏"));
    }

    function updatePhoneFrameMode(state) {
      const phone = $("phone");
      if (!phone) return;
      phone.classList.toggle("home-target", isTargetHomeExact(state));
      phone.classList.toggle("reference-home-layout", shouldUseReferenceHomeLayout(state));
      phone.classList.toggle("tab-manager-active", isTabManagerState(state));

    function updateSystemNavMask(state) {
      const darkMask = state.syntheticScreen && state.syntheticScreen.type === "scanCamera";
      $("phone").classList.toggle("system-nav-dark", Boolean(darkMask));
    }

    function shouldShowAnGeLogoOverlay(state) {
      if (isPureXBrowserMode()) return false;
      if (!state || state.syntheticScreen) return false;
      if (isTabManagerState(state)) return false;
      if (isTargetHomeExact(state)) return false;
      if (currentHomeReplacementImage(state)) return false;
      if (hasForegroundCaptureLayer(state)) return false;
      if (isHomeLikeState(state)) return Boolean(state.image);
      const text = (state.texts || []).join(" ");
      return text.includes("Start Page") && Boolean(state.image);
    }

    function hasForegroundCaptureLayer(state) {
      if (!state) return false;
      if (isCapturedHomeToastState(state)) return false;
      const text = (state.texts || []).join(" ");
      return state.title.includes("工具箱菜单") ||
        state.title.includes("pop_menu_item") ||
        text.includes("存为书签") ||
        text.includes("页面中查找") ||
        text.includes("生成二维码") ||
        text.includes("举报网址") ||
        text.includes("点击二维码保存至相册") ||
        text.includes("请填写您的举报内容和理由");
    }

    function capturedToastBrandKind(state) {
      if (!state || state.syntheticScreen || !state.image) return "";
      if (state.id === "real_user_center_login_form") return "";
      const text = (state.texts || []).join(" ");
      if (!text.includes("X浏览器")) return "";
      if (text.includes("当前页面不支持标记广告")) return "mark-ad";
      if (text.includes("本地页面不支持这个操作") || text.includes("本地页面不支持离线")) return "home-toast";
      if (text.includes("添加了一个书签")) return "bookmark-added";
      return "";
    }

    function isCapturedHomeToastState(state) {
      const text = (state && state.texts || []).join(" ");
      return Boolean(state && state.image && text.includes("Start Page") && capturedToastBrandKind(state) === "home-toast");
    }

    function updateAnGeLogoOverlay(state) {
      const overlay = $("angeLogoOverlay");
      if (!overlay) return;
      const show = shouldShowAnGeLogoOverlay(state);
      overlay.hidden = !show;
      const logoImg = overlay.querySelector("img");
      const worldCupLogo = show && isHomeLikeState(state);
      overlay.classList.toggle("ag-world-cup", Boolean(worldCupLogo));
      if (logoImg) {
        logoImg.src = worldCupLogo ? "assets/ag-browser-world-cup-reference.png?v=1" : "assets/ange-logo.svg?v=8";
        logoImg.alt = worldCupLogo ? "AG Browser" : "AnGe";
      }
      const dimmed = show && (
        isTabManagerState(state) ||
        state.title.includes("主菜单") ||
        state.title.includes("打开的标签") ||
        state.title.includes("工具箱")
      );
      $("phone").classList.toggle("ange-logo-dim", Boolean(dimmed));
    }

      if (isPureXBrowserMode()) return false;
      if (!state || state.syntheticScreen || isTabManagerState(state)) return false;
      if (currentHomeBackedMenuImage(state)) return false;
      const text = (state.texts || []).join(" ");

      const overlay = $("userCenterIconOverlay");
      if (!overlay) return;

    const BOTTOM_BAR_LABELS = ["后退", "前进", "主菜单", "打开的标签", "主页"];

      const left = Math.max(0, x);
      const top = Math.max(0, y);
      const right = Math.min(data.meta.screenWidth, x + width);
      const bottom = Math.min(data.meta.screenHeight, y + height);
      return [left, top, Math.max(1, right - left), Math.max(1, bottom - top)];

    function expandBounds(bounds, xPad, yPad = xPad) {

      const xPad = Math.max(12, Math.min(34, (112 - Math.min(width, 112)) / 2 + 12));
      const yPad = Math.max(10, Math.min(28, (64 - Math.min(height, 64)) / 2 + 10));

      const y = (event.clientY - rect.top) / rect.height * data.meta.screenHeight;

    function pointInBounds(point, bounds, slop = 0) {
      if (!point || !bounds) return false;
      const [x, y, width, height] = bounds;
      return point.x >= x - slop &&
        point.x <= x + width + slop &&
        point.y >= y - slop &&
        point.y <= y + height + slop;
    }

    function hotspotCenter(hotspot) {
      const [x, y, width, height] = hotspot.hitBounds || hotspot.bounds;
      return { x: x + width / 2, y: y + height / 2 };
    }

    function hotspotDistance(point, hotspot) {
      const center = hotspotCenter(hotspot);
      const dx = point.x - center.x;
      const dy = point.y - center.y;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function homeShortcutHotspotFromPoint(point) {
      const state = stateMap.get(currentId);
      if (isPureXBrowserMode()) return null;
      if (!point || !isHomeLikeState(state) || ucMoreOpen || ucSearchEngineOpen) return null;
      if (point.y < 600 || point.y > 820) return null;
      const row = 0;
      const column = Math.max(0, Math.min(4, Math.floor(point.x / (data.meta.screenWidth / 5))));
      const label = HOME_SHORTCUT_ROWS[row] && HOME_SHORTCUT_ROWS[row][column];
      if (!label) return null;
      return renderedHotspots.find((hotspot) => hotspot.label === label) || null;
    }

    function tabManagerToolHotspotFromPoint(point) {
      const state = stateMap.get(currentId);
      if (!point || !isTabManagerState(state)) return null;
      if (point.y < 1480 || point.y > 1655) return null;
      const tools = [
        { label: "搜索标签", minX: 0, maxX: 360 },
        { label: "新建标签", minX: 360, maxX: 720 },
        { label: "清理全部标签", minX: 720, maxX: data.meta.screenWidth }
      ];
      const match = tools.find((tool) => point.x >= tool.minX && point.x < tool.maxX);
      return match ? renderedHotspots.find((hotspot) => hotspot.label === match.label) || null : null;
    }

    function hotspotSlop(hotspot) {
      const label = hotspot.label || "";
      if (BOTTOM_BAR_LABELS.includes(label)) return 0;
      if (label === "搜索/地址栏") return 18;
      if (UC_HOME_SHORTCUTS.some((item) => item.label === label)) return 28;
      if (UC_MORE_PAGES.flat().some((item) => item.label === label)) return 24;
      if (isMainMenuState(stateMap.get(currentId)) || isMainMenuLikeState(stateMap.get(currentId))) return 36;
      return 24;
    }

    function bottomBarHotspotFromEvent(event) {
      if (!renderedHotspots.length) return null;
      const point = designPointFromEvent(event);
      if (!point || point.y < 1560 || point.y > data.meta.screenHeight) return null;
      const hasBottomBar = renderedHotspots.some((hotspot) =>
        BOTTOM_BAR_LABELS.includes(hotspot.label) && hotspot.bounds && hotspot.bounds[1] >= 1500
      );
      if (!hasBottomBar) return null;
      const index = Math.max(0, Math.min(BOTTOM_BAR_LABELS.length - 1, Math.floor(point.x / (data.meta.screenWidth / BOTTOM_BAR_LABELS.length))));
      const label = BOTTOM_BAR_LABELS[index];
      return renderedHotspots.find((hotspot) =>
        hotspot.label === label && hotspot.bounds && hotspot.bounds[1] >= 1500
      ) || null;
    }

    function hotspotFromEvent(event) {
      const point = designPointFromEvent(event);
      if (!point || !renderedHotspots.length) return null;
      const tabManagerToolHotspot = tabManagerToolHotspotFromPoint(point);
      if (tabManagerToolHotspot) return tabManagerToolHotspot;

      const exact = sorted.find((hotspot) => pointInBounds(point, hotspot.hitBounds || hotspot.bounds));
      if (exact) return exact;
      const nearby = sorted
        .filter((hotspot) => pointInBounds(point, hotspot.hitBounds || hotspot.bounds, hotspotSlop(hotspot)))
        .map((hotspot) => ({ hotspot, distance: hotspotDistance(point, hotspot) }))
        .sort((a, b) => a.distance - b.distance);
      return nearby[0] ? nearby[0].hotspot : null;
    }

    function renderSlideStatus(state) {
      const chips = [];
      const swipe = state.swipe || {};
      const scroll = state.scroll || {};
      if (swipe.left) chips.push(["ready", "左滑已接入"]);
      else if (state.swipeable) chips.push(["pending", "左滑回弹"]);
      if (swipe.right) chips.push(["ready", "右滑已接入"]);
      if (scroll.next) chips.push(["ready", "上滑已接入"]);
      else if (state.scrollable) chips.push(["pending", "上滑回弹"]);
      if (scroll.prev) chips.push(["ready", "下滑已接入"]);
      if (!chips.length) chips.push(["", "无滑动状态"]);
      $("slideStatus").innerHTML = chips.map(([type, label]) => `<span class="slide-chip ${type}">${esc(label)}</span>`).join("");
    }

    function isMainMenuState(state) {
      if (!state) return false;
      const labels = (state.hotspots || []).map((hotspot) => hotspot.label).join(" ");
      const texts = (state.texts || []).join(" ");
      return state.title.includes("主菜单") && texts.includes("用户中心") && labels.includes("打开设置");
    }

    function hotspotPriority(state, hotspot) {
      const label = hotspot.label || "";
      const [, y] = hotspot.bounds;
      const actionType = hotspot.action && hotspot.action.type;
      if (actionType === "ucMoreClose") return 12;
      if (actionType === "ucMorePage") return 72;
      if (["ucSearchEngineOpen", "ucSearchEngineClose", "ucSearchEngineSelect", "ucSearchInput"].includes(actionType)) return 74;
      if (ucMoreOpen && (actionType === "ucShortcut" || actionType === "state" || actionType === "ucOpenAddSites")) return 70;
      if (["ucAddSitesClose", "ucAddSiteSelected", "ucAddSiteAdd", "ucAddSitesEdit"].includes(actionType)) return 72;
      if (BOTTOM_BAR_LABELS.includes(label) && y >= 1500) return 80;
      if (isTabManagerState(state)) {
        if (["tabClose", "tabAdd", "tabClear"].includes(actionType)) return 40;
        if (actionType === "tabSelect") return 30;
      }
      if (isHomeLikeState(state) && UC_HOME_SHORTCUTS.some((item) => item.label === label)) return 35;
      if ((isMainMenuState(state) || isMainMenuLikeState(state)) && label === "扫码") return 35;
      if ((isMainMenuState(state) || isMainMenuLikeState(state)) && y >= 1650) {
        if (["打开设置", "关闭菜单", "退出浏览器"].includes(label)) return 30;
        if (["后退", "前进", "主菜单", "打开的标签", "主页"].includes(label)) return 5;
      }
      return 10;
    }

    function renderHotspots(state, hotspots = getHotspotsForState(state)) {
      renderedHotspots = hotspots.map((hotspot) => ({

        hitBounds: interactiveBounds(state, hotspot)
      }));
      $("hotspotLayer").innerHTML = renderedHotspots.map((hotspot, index) => {
        const [x, y, width, height] = hotspot.hitBounds || hotspot.bounds;
        const style = [
          `left:${x / data.meta.screenWidth * 100}%`,
          `top:${y / data.meta.screenHeight * 100}%`,
          `width:${width / data.meta.screenWidth * 100}%`,
          `height:${height / data.meta.screenHeight * 100}%`,
          `z-index:${hotspotPriority(state, hotspot)}`
        ].join(";");
        return `<button class="hotspot" style="${style}" data-hotspot="${index}" aria-label="${esc(hotspot.label)}"></button>`;
      }).join("");
    }

    function renderNav() {
      const filtered = states.filter((state) => {
        const haystack = [state.id, state.title, state.name, state.texts.join(" ")].join(" ").toLowerCase();
        return !search || haystack.includes(search.toLowerCase());

    function goTo(id, pushHistory = true) {
      id = normalizeStateId(id);
      if (!stateMap.has(id)) {

      if (pushHistory && id !== currentId) {
        historyStack.push(currentId);
      }

      render();

    function commitNavigation(id, pushHistory = true) {
      id = normalizeStateId(id);
      if (!stateMap.has(id)) {
        showToast("目标页面未采集");

      }
      if (pushHistory && id !== currentId) {

    function normalizeActiveTab() {
      if (!demoTabs.length) {
        demoTabs = [{ id: "tab-home", title: "主页", stateId: homeStateId(), url: "about:home", active: true }];
        return;
      }
      if (!demoTabs.some((tab) => tab.active)) {
        demoTabs[0].active = true;
      }
    }

    function addDemoTab() {
      demoTabs.forEach((tab) => { tab.active = false; });
      const tabNumber = nextDemoTabNumber;
      demoTabs.push({
        id: `tab-${tabNumber}`,
        title: tabNumber === 2 ? "新建标签页" : `新建标签页 ${tabNumber}`,
        stateId: homeStateId(),
        url: "about:newtab",
        active: true
      });
      nextDemoTabNumber += 1;
      currentId = "0003_effect_打开的标签";
      render();
      showPhoneToast("已新建标签页", { compact: true });
    }

    function closeDemoTab(tabId) {
      const index = demoTabs.findIndex((tab) => tab.id === tabId);
      if (index < 0) return;
      if (demoTabs.length === 1) {
        demoTabs = [{ id: "tab-home", title: "主页", stateId: homeStateId(), url: "about:home", active: true }];
        showPhoneToast("已关闭当前标签", { compact: true });
        render();
        return;
      }
      const wasActive = demoTabs[index].active;
      demoTabs.splice(index, 1);
      if (wasActive) {
        const nextIndex = Math.max(0, index - 1);
        demoTabs[nextIndex].active = true;
      }
      normalizeActiveTab();
      render();
    }

    function clearDemoTabs() {
      demoTabs = [{ id: "tab-home", title: "主页", stateId: homeStateId(), url: "about:home", active: true }];
      showPhoneToast("标签已清理", { compact: true });
      render();
    }

    function selectDemoTab(tabId) {
      const tab = demoTabs.find((item) => item.id === tabId);
      if (!tab) return;
      demoTabs.forEach((item) => { item.active = item.id === tabId; });
      commitNavigation(tab.stateId || homeStateId(), true);
    }

    function goBack() {
      const previous = historyStack.pop();
      if (previous) {
        currentId = normalizeStateId(previous);
        render();
      } else {
        showPhoneToast("没有上一页历史", { compact: true });
      }
    }

    function resetScreenStack() {
      const stack = $("screenStack");
      stack.classList.remove("dragging", "animating");
      stack.style.transform = "";
    }

    function directionTransform(direction, amount = 100) {
      if (direction === "left") return `translate3d(${-amount}%,0,0)`;
      if (direction === "right") return `translate3d(${amount}%,0,0)`;
      if (direction === "up") return `translate3d(0,${-amount}%,0)`;
      return `translate3d(0,${amount}%,0)`;
    }

    function incomingTransform(direction, amount = 100) {
      if (direction === "left") return `translate3d(${amount}%,0,0)`;
      if (direction === "right") return `translate3d(${-amount}%,0,0)`;
      if (direction === "up") return `translate3d(0,${amount}%,0)`;
      return `translate3d(0,${-amount}%,0)`;
    }

    function wait(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function showGestureHud(label) {
      clearTimeout(gestureHudTimer);
      const hud = $("gestureHud");
      hud.textContent = label;
      hud.classList.add("show");
      gestureHudTimer = setTimeout(() => hud.classList.remove("show"), 900);
    }

    async function animateToState(targetId, direction) {
      if (navigationLocked) return;
      targetId = normalizeStateId(targetId);
      const target = stateMap.get(targetId);
      if (!target) {
        showToast("目标页面未采集");
        return;
      }
      navigationLocked = true;
      showGestureHud(DIRECTION_LABELS[direction] || "滑动");
      const layer = $("motionLayer");
      layer.innerHTML = `<div id="motionPanel" class="motion-panel" style="transform:${incomingTransform(direction)}">${screenMarkup(target)}</div>`;
      const panel = $("motionPanel");
      const stack = $("screenStack");
      stack.classList.add("animating");
      panel.classList.add("animating");
      requestAnimationFrame(() => {
        stack.style.transform = directionTransform(direction);
        panel.style.transform = "translate3d(0,0,0)";
      });
      await wait(300);
      navigationLocked = false;
      layer.innerHTML = "";
      stack.classList.remove("animating");
      stack.style.transform = "";
      commitNavigation(targetId, true);
    }

    async function playElasticMotion(direction, message) {
      if (navigationLocked) return;
      navigationLocked = true;
      showGestureHud(DIRECTION_LABELS[direction] || "滑动");
      const stack = $("screenStack");
      stack.classList.add("animating");
      requestAnimationFrame(() => {
        stack.style.transform = directionTransform(direction, 18);
      });
      await wait(230);
      stack.style.transform = "";
      await wait(290);
      stack.classList.remove("animating");
      navigationLocked = false;
      if (message) showPhoneToast(message, { compact: true });
    }

    function playToggleFeedback(hotspot) {
      if (!hotspot || !hotspot.bounds) return;
      const [x, y, width, height] = hotspot.bounds;
      const left = Math.max(0, x - 10);
      const top = Math.max(0, y - 18);
      const visualWidth = Math.max(width + 16, 86);
      const visualHeight = Math.max(height + 28, 42);
      const marker = document.createElement("div");
      marker.className = "toggle-feedback";
      marker.style.left = `${left / data.meta.screenWidth * 100}%`;
      marker.style.top = `${top / data.meta.screenHeight * 100}%`;
      marker.style.width = `${visualWidth / data.meta.screenWidth * 100}%`;
      marker.style.height = `${visualHeight / data.meta.screenHeight * 100}%`;
      $("phone").appendChild(marker);
      setTimeout(() => marker.remove(), 680);
    }

    function clearBookmarkTransientState() {
      bookmarkOverlay = "";
      bookmarkPendingDeleteId = "";

        color: "#4b5563",

    function addCreatedBookmark() {
      createdBookmarkCount += 1;
      const id = `created-${createdBookmarkCount}`;
      bookmarkItems.unshift({
        id,
        type: "bookmark",
        title: createdBookmarkCount === 1 ? "主页" : `新建书签 ${createdBookmarkCount}`,

        icon: "X",
        color: "#2b7de9",
        target: homeStateId()
      });

    function addBookmarkFolder() {
      const exists = bookmarkItems.some((item) => item.id === "ange-folder");
      if (exists) return false;
      const firstFolderIndex = bookmarkItems.findIndex((item) => item.type === "folder");
      const folder = { id: "xbrowser-folder", type: "folder", title: "XBrowser 资料", url: "0 个书签", icon: "", color: "", target: "old_user_bookmarks_list" };
      if (firstFolderIndex >= 0) bookmarkItems.splice(firstFolderIndex, 0, folder);
      else bookmarkItems.push(folder);
      return true;
    }

    function deleteBookmarkItem(id) {
      const before = bookmarkItems.length;
      bookmarkItems = bookmarkItems.filter((item) => item.id !== id);
      bookmarkSwipedId = "";
      bookmarkPendingDeleteId = "";
      return bookmarkItems.length !== before;
    }

    function closeUcMore() {
      ucMoreOpen = false;
      render();
    }

    function openUcAddSites() {
      ucMoreOpen = false;
      ucAddSitesScroll = 0;
      ucAddSitesSpaceToast = false;
      goTo("uc_add_sites");
    }

    function closeUcAddSites() {
      ucAddSitesScroll = 0;
      ucAddSitesSpaceToast = false;
      if (historyStack.length) goBack();
      else goTo(homeStateId(), false);
    }

    function openUcShortcut(label) {
      ucMoreOpen = false;
      historyCleared = false;
      render();
      showPhoneToast(`打开 ${label}`, { compact: true });
    }

    function handleAction(action, hotspot) {
      if (!action) {
        showPhoneToast("真实点击反馈", { compact: true });
        return;
      }
      if (action.type === "ucMoreOpen") {
        ucSearchEngineOpen = false;
        ucMoreOpen = true;
        ucMorePage = 0;
        render();
        return;
      }
      if (action.type === "ucSearchEngineOpen") {
        ucMoreOpen = false;
        ucSearchEngineOpen = true;
        render();
        return;
      }
      if (action.type === "ucSearchEngineClose") {
        ucSearchEngineOpen = false;
        render();
        return;
      }
      if (action.type === "ucSearchEngineSelect") {
        if (UC_SEARCH_ENGINES.some((engine) => engine.id === action.id)) {
          ucSearchEngineId = action.id;
        }
        ucSearchEngineOpen = false;
        render();
        return;
      }
      if (action.type === "ucSearchInput") {
        ucSearchEngineOpen = false;
        if (shouldUseReferenceHomeLayout(stateMap.get(currentId)) && ucFeedScroll === 0) {
          ucFeedScroll = 1;
        }
        render();
        requestAnimationFrame(() => {
          const input = $("ucSearchOverlay") && $("ucSearchOverlay").querySelector(".uc-search-input");
          if (input) input.focus();
        });
        return;
      }
      if (action.type === "ucMoreClose") {
        closeUcMore();
        return;
      }
      if (action.type === "ucMorePage") {
        ucMorePage = Math.max(0, Math.min(UC_MORE_PAGES.length - 1, Number(action.page) || 0));
        ucMoreOpen = true;
        render();
        return;
      }
      if (action.type === "ucOpenAddSites") {
        openUcAddSites();
        return;
      }
      if (action.type === "ucAddSitesClose") {
        closeUcAddSites();
        return;
      }
      if (action.type === "ucAddSiteSelected") {
        ucAddSitesSpaceToast = false;
        render();
        showPhoneToast(`${action.label || "该网站"} 已在首页`, { compact: true });
        return;
      }
      if (action.type === "ucAddSiteAdd") {
        ucAddSitesSpaceToast = true;
        render();
        return;
      }
      if (action.type === "ucAddSitesEdit") {
        ucAddSitesScroll = 0;
        ucAddSitesSpaceToast = false;
        goTo(homeStateId());
        showPhoneToast("进入首页编辑", { compact: true });
        return;
      }
      if (action.type === "ucShortcut") {
        openUcShortcut(action.label || (hotspot && hotspot.label) || "站点");
        return;
      }
      if (action.type === "bookmarkSort") {
        bookmarkSortLabel = action.label || "默认排序";
        clearBookmarkTransientState();
        openBookmarkList();
        showPhoneToast(`${bookmarkSortLabel}`, { compact: true });
        return;
      }
      if (action.type === "bookmarkEditMode") {
        bookmarkEditMode = true;
        clearBookmarkTransientState();
        openBookmarkList();
        showPhoneToast("已进入编辑模式", { compact: true });
        return;
      }
      if (action.type === "bookmarkNewFolder") {
        bookmarkOverlay = "newFolder";
        bookmarkSwipedId = "";
        currentId = "old_user_bookmarks_list";
        render();
        return;
      }
      if (action.type === "bookmarkCreateFolder") {
        const created = addBookmarkFolder();
        clearBookmarkTransientState();
        openBookmarkList();
        showPhoneToast(created ? "目录已创建" : "目录已存在", { compact: true });
        return;
      }
      if (action.type === "bookmarkImportFile") {
        addImportedBookmarks();
        clearBookmarkTransientState();
        openBookmarkList();
        showPhoneToast("已从 bookmarks.html 导入书签", { compact: true });
        return;
      }
      if (action.type === "bookmarkExportConfirm") {
        bookmarkOverlay = "exportConfirm";
        bookmarkSwipedId = "";
        currentId = "old_user_bookmarks_list";
        render();
        return;
      }
      if (action.type === "bookmarkExportDone") {
        bookmarkOverlay = "exportDone";
        bookmarkSwipedId = "";
        currentId = "old_user_bookmarks_list";
        render();
        return;
      }
      if (action.type === "bookmarkCancel") {
        clearBookmarkTransientState();
        openBookmarkList();
        return;
      }
      if (action.type === "bookmarkRevealDelete") {
        bookmarkSwipedId = action.id || "";
        clearBookmarkTransientState();
        currentId = "old_user_bookmarks_list";
        render();
        return;
      }
      if (action.type === "bookmarkDeleteAsk") {
        bookmarkPendingDeleteId = action.id || "";
        bookmarkOverlay = "deleteConfirm";
        currentId = "old_user_bookmarks_list";
        render();
        return;
      }
      if (action.type === "bookmarkDeleteConfirm") {
        const deleted = deleteBookmarkItem(bookmarkPendingDeleteId);
        clearBookmarkTransientState();
        openBookmarkList();
        showPhoneToast(deleted ? "书签已删除" : "未找到书签", { compact: true });
        return;
      }
      if (action.type === "historyClearConfirm") {
        historyCleared = true;
        goTo(historyStateId(), false);
        showPhoneToast("历史记录已清除", { compact: true });
        return;
      }
      if (action.type === "scanToolbox") {
        goTo("gap_scan_camera_after_permission");
        return;
      }
      if (SCAN_FEATURE_DISABLED && action.type === "state" && isScanStateId(action.id)) {
        showPhoneToast("扫码功能已移除", { compact: true });
        return;
      }
      if (action.type === "state") {
        if (isNewBookmarkState(stateMap.get(currentId)) && hotspot && hotspot.label === "确定") {
          addCreatedBookmark();
          clearBookmarkTransientState();
          openBookmarkList();
          showPhoneToast("书签已添加", { compact: true });
          return;
        }
        ucMoreOpen = false;
        ucSearchEngineOpen = false;
        const targetId = normalizeStateId(action.id);
        const targetState = stateMap.get(targetId);
        if (isBookmarkDemoState(targetState)) {
          bookmarkOverlay = "";
          bookmarkPendingDeleteId = "";
          if (targetId !== currentId) bookmarkSwipedId = "";
        } else if (!String(targetId || "").startsWith("gap_bookmark_")) {
          bookmarkSwipedId = "";
          bookmarkOverlay = "";
          bookmarkPendingDeleteId = "";
        }
        if (targetId === currentId) {
          showPhoneToast(action.text || "真实点击反馈", { compact: true });
          return;
        }
        goTo(targetId);
        return;
      }
      if (action.type === "tabAdd") {
        addDemoTab();
        return;
      }
      if (action.type === "tabClose") {
        closeDemoTab(action.id);
        return;
      }
      if (action.type === "tabClear") {
        clearDemoTabs();
        return;
      }
      if (action.type === "tabSelect") {
        selectDemoTab(action.id);
        return;
      }
      if (action.type === "back") {
        goBack();
        return;
      }
      if (action.type === "toggle") {
        playToggleFeedback(hotspot);
        return;
      }
      if (action.type === "nativeToast") {
        showPhoneToast(action.text || "真实点击反馈", action);
        return;
      }
      showPhoneToast(action.text || "真实点击反馈", { compact: true });
    }

    function handleScrollNavigation(direction) {
      const state = stateMap.get(currentId);
      if (!state) return;
      if (ucSearchEngineOpen) {
        ucSearchEngineOpen = false;
        showGestureHud(direction === "next" ? "上滑" : "下滑");
        render();
        return;
      }
      if (ucMoreOpen) {
        if (direction === "prev") {
          closeUcMore();
          showGestureHud("下滑");
          return;
        }
        playElasticMotion("up", "已到当前页面边界");
        return;
      }
      if (isUcAddSitesState(state)) {
        const previousScroll = ucAddSitesScroll;
        if (direction === "next") {
          ucAddSitesScroll = clampUcAddSitesScroll(ucAddSitesScroll + UC_ADD_SITES_SCROLL_STEP);
          if (ucAddSitesScroll === previousScroll) {
            playElasticMotion("up", "已到底部");
            return;
          }
          showGestureHud("上滑");
          render();
          return;
        }
        if (ucAddSitesScroll > 0) {
          ucAddSitesScroll = clampUcAddSitesScroll(ucAddSitesScroll - UC_ADD_SITES_SCROLL_STEP);
          showGestureHud("下滑");
          render();
          return;
        }
        closeUcAddSites();
        showGestureHud("下滑");
        return;
      }
      if (isUcFeedActive(state)) {
        scrollUcFeed(direction);
        return;
      }
      const target = state.scroll && state.scroll[direction];
      const motionDirection = direction === "next" ? "up" : "down";
      if (target) {
        animateToState(target, motionDirection);
        return;
      }
      if (state.scrollable) {
        playElasticMotion(motionDirection, "已到当前页面边界");
      }
    }

    function handleSwipeNavigation(direction) {
      if (ucSearchEngineOpen) {
        ucSearchEngineOpen = false;
        showGestureHud(DIRECTION_LABELS[direction] || "滑动");
        render();
        return;
      }
      if (ucMoreOpen) {
        if (direction === "left" && ucMorePage < UC_MORE_PAGES.length - 1) {
          ucMorePage += 1;
          showGestureHud("左滑");
          render();
          return;
        }
        if (direction === "right" && ucMorePage > 0) {
          ucMorePage -= 1;
          showGestureHud("右滑");
          render();
          return;
        }
        playElasticMotion(direction, direction === "left" ? "已到最后一页" : "已到第一页");
        return;
      }
      const state = stateMap.get(currentId);
      if (!state) return;
      if (shouldSuppressReferenceHomeHorizontalSwipe(state)) return;
      const target = state.swipe && state.swipe[direction];
      if (target && target !== currentId) {
        animateToState(target, direction);
        return;
      }
      if (target === currentId || state.swipeable) {
        playElasticMotion(direction, direction === "left" ? "已到最后一页" : "已到第一页");
      }
    }

    function showToast(message) {
      clearTimeout(toastTimer);
      const toast = $("toast");
      toast.textContent = message;
      toast.classList.add("show");
      toastTimer = setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function showPhoneToast(message, options = {}) {
      clearTimeout(phoneToastTimer);
      const toast = $("phoneToast");
      toast.hidden = false;
      toast.className = `phone-native-toast ${options.compact ? "compact" : ""}`;
      const icon = options.icon === "xbrowser"
        ? `<span class="phone-toast-icon"><img src="assets/ange-toast-icon.svg?v=8" alt="AnGe"></span>`
        : "";
      toast.innerHTML = `${icon}<span>${esc(message)}</span>`;
      toast.getBoundingClientRect();
      toast.classList.add("show");
      phoneToastTimer = setTimeout(() => {
        toast.classList.remove("show");
        setTimeout(() => {
          if (!toast.classList.contains("show")) toast.hidden = true;
        }, 190);
      }, options.duration || 1800);
    }

    function bookmarkItemFromPoint(point) {
      const state = stateMap.get(currentId);
      if (!point || !isBookmarkDemoState(state) || bookmarkOverlay) return null;
      if (state.id !== "old_user_bookmarks_list" && state.id !== "old_user_bookmarks_search") return null;
      const rows = bookmarkRowsForState(state);
      return rows.find((item) => {
        if (item.type === "folder") return false;
        const top = bookmarkRowTop(item, rows);
        return point.y >= top && point.y <= top + bookmarkRowHeight(item);
      }) || null;
    }

    function handleBookmarkSwipe(dx, dy, startPoint) {
      const horizontal = Math.abs(dx) >= 56 && Math.abs(dx) > Math.abs(dy) * 1.2;
      if (!horizontal) return false;
      const item = bookmarkItemFromPoint(startPoint);
      if (item && dx < 0) {
        bookmarkSwipedId = item.id;
        bookmarkEditMode = true;
        clearBookmarkTransientState();
        currentId = "old_user_bookmarks_list";
        render();
        showGestureHud("左滑删除");
        return true;
      }
      if (bookmarkSwipedId && dx > 0) {
        bookmarkSwipedId = "";
        clearBookmarkTransientState();
        render();
        showGestureHud("取消删除");
        return true;
      }
      return false;
    }

    $("hotspotLayer").addEventListener("pointerdown", (event) => {
      const button = event.target.closest(".hotspot");
      if (!button) return;
      button.classList.add("pressed");
      setTimeout(() => button.classList.remove("pressed"), 180);
    });

    $("hotspotLayer").addEventListener("click", (event) => {
      const button = event.target.closest(".hotspot");
      if (!button) return;
      if (suppressHotspotClick) {
        event.preventDefault();
        event.stopPropagation();
        suppressHotspotClick = false;
        return;
      }
      const state = stateMap.get(currentId);
      const hotspot = renderedHotspots[Number(button.dataset.hotspot)] || (state && state.hotspots[Number(button.dataset.hotspot)]);
      handleAction(hotspot && hotspot.action, hotspot);
    });

    $("screenStack").addEventListener("input", (event) => {
      const input = event.target.closest(".uc-search-input");
      if (!input) return;
      ucSearchText = input.value;
    });

    $("screenStack").addEventListener("focusin", (event) => {
      const input = event.target.closest(".uc-search-input");
      if (!input) return;
      ucSearchEngineOpen = false;
      const engineOverlay = $("ucSearchEngineOverlay");
      if (engineOverlay) {
        engineOverlay.hidden = true;
        engineOverlay.innerHTML = "";
      }
      const searchBar = input.closest(".uc-search-bar");
      if (searchBar) searchBar.classList.remove("open");
    });

    $("screenStack").addEventListener("keydown", (event) => {
      const input = event.target.closest(".uc-search-input");
      if (!input || event.key !== "Enter") return;
      event.preventDefault();
      ucSearchText = input.value;
      const query = ucSearchText.trim();
      showPhoneToast(query ? `搜索：${query}` : "请输入搜索内容", { compact: true });
      input.blur();
    });

    $("phone").addEventListener("click", (event) => {
      if (event.target.closest(".hotspot")) return;
      if (event.target.closest(".uc-search-input")) return;
      const hotspot = hotspotFromEvent(event);
      if (!hotspot) return;
      event.preventDefault();
      event.stopPropagation();
      handleAction(hotspot.action, hotspot);
    }, true);

    $("phone").addEventListener("wheel", (event) => {
      if (navigationLocked) return;
      const wheelState = stateMap.get(currentId);
      if (isUcFeedActive(wheelState) && Math.abs(event.deltaY) >= 2 && Math.abs(event.deltaY) >= Math.abs(event.deltaX)) {
        event.preventDefault();
        scrollUcFeedBy((event.deltaY / currentScreenScale()) * UC_FEED_WHEEL_MULTIPLIER, {
          elastic: false,
          gesture: false
        });
        return;
      }
      const now = Date.now();
      if (now - lastScrollNavigateAt < 520) return;
      if (Math.abs(event.deltaX) > Math.abs(event.deltaY) && Math.abs(event.deltaX) > 20) {
        const handledBookmarkSwipe = handleBookmarkSwipe(event.deltaX > 0 ? -80 : 80, 0, designPointFromEvent(event));
        if (handledBookmarkSwipe) {
          event.preventDefault();
          lastScrollNavigateAt = now;
          return;
        }
        event.preventDefault();
        lastScrollNavigateAt = now;
        handleSwipeNavigation(event.deltaX > 0 ? "left" : "right");
        return;
      }
      if (Math.abs(event.deltaY) < 24) return;
      event.preventDefault();
      lastScrollNavigateAt = now;
      handleScrollNavigation(event.deltaY > 0 ? "next" : "prev");
    }, { passive: false });

    function handleUcFeedDragMove(dx, dy) {
      const state = stateMap.get(currentId);
      if (!dragState || !isUcFeedActive(state)) return false;
      const absX = Math.abs(dx);
      const absY = Math.abs(dy);
      if (absY < 8 || absY < absX * 1.05) return false;
      if (!dragState.feedDragActive) {
        dragState.feedDragActive = true;
        dragState.feedScrollStart = ucFeedScroll;
      }
      const nextScroll = clampUcFeedScroll((dragState.feedScrollStart || 0) - (dy / currentScreenScale()));
      if (nextScroll !== ucFeedScroll) {
        ucFeedScroll = nextScroll;
        render();
      }
      showGestureHud(dy < 0 ? "上滑" : "下滑");
      return true;
    }

    function applyDragPreview(dx, dy) {
      const state = stateMap.get(currentId);
      if (!state) return;
      const absX = Math.abs(dx);
      const absY = Math.abs(dy);
      if (absX < 6 && absY < 6) return;
      const horizontal = absX > absY * 1.15;
      const vertical = absY > absX * 1.15;
      if (!horizontal && !vertical) return;
      if (horizontal && shouldSuppressReferenceHomeHorizontalSwipe(state)) return;
      if ((ucMoreOpen || ucSearchEngineOpen || isUcAddSitesState(state)) && vertical) {
        showGestureHud(dy < 0 ? "上滑" : "下滑");
        return;
      }
      if (isUcFeedActive(state) && vertical) {
        showGestureHud(dy < 0 ? "上滑" : "下滑");
        return;
      }

      const phone = $("phone").getBoundingClientRect();
      let offsetX = 0;
      let offsetY = 0;
      let label = "";
      let canSlide = false;
      if (horizontal) {
        const direction = dx < 0 ? "left" : "right";
        canSlide = Boolean((state.swipe && state.swipe[direction]) || state.swipeable);
        const limit = canSlide ? phone.width * .28 : phone.width * .08;
        offsetX = Math.max(-limit, Math.min(limit, dx));
        label = DIRECTION_LABELS[direction];
      } else {
        const direction = dy < 0 ? "up" : "down";
        const scrollKey = direction === "up" ? "next" : "prev";
        canSlide = Boolean((state.scroll && state.scroll[scrollKey]) || state.scrollable);
        const limit = canSlide ? phone.height * .22 : phone.height * .07;
        offsetY = Math.max(-limit, Math.min(limit, dy));
        label = DIRECTION_LABELS[direction];
      }
      if (!canSlide) return;
      const stack = $("screenStack");
      stack.classList.add("dragging");
      stack.style.transform = `translate3d(${offsetX}px, ${offsetY}px, 0)`;
      showGestureHud(label);
    }

    $("phone").addEventListener("pointerdown", (event) => {
      if (navigationLocked) return;
      if (event.target.closest(".uc-search-input")) return;
      swipeStart = { x: event.clientX, y: event.clientY, design: designPointFromEvent(event) };
      dragState = { pointerId: event.pointerId, moved: false };
      $("phone").setPointerCapture?.(event.pointerId);
    });

    $("phone").addEventListener("pointermove", (event) => {
      if (!swipeStart || !dragState) return;
      const dy = event.clientY - swipeStart.y;
      const dx = event.clientX - swipeStart.x;
      if (Math.max(Math.abs(dx), Math.abs(dy)) > 12) {
        dragState.moved = true;
        suppressHotspotClick = true;
      }
      if (handleUcFeedDragMove(dx, dy)) return;
      applyDragPreview(dx, dy);
    });

    $("phone").addEventListener("pointerup", (event) => {
      if (!swipeStart) {
        swipeStart = null;
        dragState = null;
        return;
      }
      const dy = event.clientY - swipeStart.y;
      const dx = event.clientX - swipeStart.x;
      const moved = dragState && dragState.moved;
      const feedDragActive = dragState && dragState.feedDragActive;
      const startDesignPoint = swipeStart.design;
      swipeStart = null;
      dragState = null;
      resetScreenStack();
      if (moved) {
        suppressHotspotClick = true;
        setTimeout(() => { suppressHotspotClick = false; }, 240);
      }
      if (feedDragActive) {
        showGestureHud(dy < 0 ? "上滑" : "下滑");
        return;
      }
      if (handleBookmarkSwipe(dx, dy, startDesignPoint)) {
        return;
      }
      if (Math.abs(dx) >= 56 && Math.abs(dx) > Math.abs(dy) * 1.2) {
        handleSwipeNavigation(dx < 0 ? "left" : "right");
        return;
      }
      if (Math.abs(dy) < 56 || Math.abs(dy) < Math.abs(dx) * 1.2) return;
      handleScrollNavigation(dy < 0 ? "next" : "prev");
    });

    $("phone").addEventListener("pointercancel", () => {
      swipeStart = null;
      dragState = null;
      setTimeout(() => { suppressHotspotClick = false; }, 120);
      resetScreenStack();
    });

    $("navList").addEventListener("click", (event) => {
      const item = event.target.closest("[data-state]");
      if (item) goTo(item.dataset.state);
    });

    $("searchInput").addEventListener("input", (event) => {
      search = event.target.value;
      renderNav();
    });

    $("hotspotBtn").addEventListener("click", () => {
      showHotspots = !showHotspots;
      render();
    });

    $("fullscreenBtn").addEventListener("click", () => {
      document.body.classList.toggle("fullscreen");
      render();
    });

    $("backBtn").addEventListener("click", goBack);

    window.addEventListener("resize", updateSyntheticScale);

    window.addEventListener("keydown", (event) => {
      const activeTag = document.activeElement && document.activeElement.tagName;
      if (activeTag === "INPUT" || activeTag === "TEXTAREA") return;
      if (event.key === "Escape") {
        document.body.classList.remove("fullscreen");
        render();
      }
      if (event.key === "h") {
        showHotspots = !showHotspots;
        render();
      }
      if (event.key === "ArrowLeft") {
        event.preventDefault();
        handleSwipeNavigation("left");
      }
      if (event.key === "ArrowRight") {
        event.preventDefault();
        handleSwipeNavigation("right");
      }
      if (event.key === "ArrowUp" || event.key === "PageDown") {
        event.preventDefault();
        handleScrollNavigation("next");
      }
      if (event.key === "ArrowDown" || event.key === "PageUp") {
        event.preventDefault();
        handleScrollNavigation("prev");
      }
    });

    currentId = initialStateId();
    render();
  </script>
</body>
</html>
